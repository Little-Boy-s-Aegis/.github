name: Security hardening
description: Suggest a non-sensitive defensive improvement
title: "[Hardening]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this only for non-sensitive hardening work. Do not publish exploit details or active vulnerabilities here. For vulnerabilities, follow SECURITY.md.
  - type: input
    id: repository
    attributes:
      label: Repository or component
      placeholder: "aegis-bank-backend / dashboard / terraform / ..."
    validations:
      required: true
  - type: textarea
    id: finding
    attributes:
      label: Hardening opportunity
      description: What should be improved?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Authentication or authorization
        - Input validation
        - Secrets handling
        - Network exposure
        - Supply chain
        - Observability or audit
        - Response automation safety
        - Cloud or infrastructure posture
        - Documentation
        - Other
  - type: textarea
    id: recommendation
    attributes:
      label: Recommended change
      description: Include safe, non-sensitive implementation guidance.
  - type: checkboxes
    id: disclosure
    attributes:
      label: Disclosure safety
      options:
        - label: This issue does not include exploit details, secrets, production data, or unauthorized test results.
          required: true
