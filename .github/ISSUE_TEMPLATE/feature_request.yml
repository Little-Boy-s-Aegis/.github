name: Feature request
description: Propose a new capability, workflow, or improvement
title: "[Feature]: "
body:
  - type: input
    id: repository
    attributes:
      label: Repository or component
      placeholder: "agent-layer-1 / dashboard / aegis-bank-deployment / ..."
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What user, analyst, maintainer, or security problem does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the expected behavior and any alternatives considered.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation approach
      description: How should this be tested or reviewed?
  - type: textarea
    id: security
    attributes:
      label: Security and safety considerations
      description: Note data handling, authorization, blast radius, auditability, or rollback concerns.
